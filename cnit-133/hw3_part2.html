<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Student Grades</title>
        <meta charset="utf-8">
        <meta name="description" content="Calculate an employee weekly commission and salary earned">
        <link rel="stylesheet" href="styles/hw3_part2.css">
        <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/jquery.validation/1.16.0/jquery.validate.min.js"></script>
        <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
        <script src="js/employee-earning.js"></script>
    </head>
    <body>
        <div class="content">
            <div class="box-content">
                <main>
                    <div class="calculate-title">
                        <h1>Calculate Employee Salary</h1>
                    </div>
                    <div>
                        <form class="seller-form" name="seller-form" id="seller-form">
                            <div>
                                <label for="sellerName">Seller's Name:</label>
                                <input class="seller-name" type="text" id="sellerName" name="sellerName"  title = "tooltip" placeholder="Enter the seller's name" required>
                            </div>
                            <div>
                                <p>For each item type the quantity sold by the seller</p>
                            </div>
                            <div>
                                <label for="qty-item-one">Item 1:</label>
                                <input class="item-qty" type="text" id="qty-item-one" name="qtyItemOne" placeholder="Enter the quantity" required>
                            </div>
                            <br>
                            <div>
                                <label for="qtyItemTwo">Item 2:</label>
                                <input class="item-qty" type="text" id="qty-item-two" name="qtyItemTwo" placeholder="Enter the quantity" required>
                            </div>
                            <br>
                            <div>
                                <label for="qtyItemThree">Item 3:</label>
                                <input class="item-qty" type="text" id="qty-item-three" name="qtyItemThree" placeholder="Enter the quantity" required>
                            </div>
                            <br>
                            <div>
                                <label for="qtyItemFour">Item 4:</label>
                                <input class="item-qty" type="text" id="qty-item-four" name="qtyItemFour" placeholder="Enter the quantity" required>
                            </div>
                            <br>
                            <div class="buttons-div">
                                <input class="input-button" type="button" onclick="run()" id="sumbit" value="CALCULATE">
                                <input class="input-button" type="button" onclick="clearForm()" id="clear" value="CLEAR">
                            </div>
                        </form>
                    </div>
                    <div>
                        <form name="result-form">
                            <table>
                                <tr>
                                    <th>Item #</th>
                                    <th>Price</th>
                                    <th>Qty Sold</th>
                                    <th>Total $</th>
                                </tr>
                                <tr>
                                    <td>1</td>
                                    <td>$20.99</td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-qty-item-one" name="result-qty-item-one" placeholder="Number quantity Sold" readonly>
                                    </td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-dollars-item-one" name="result-dollars-item-one" placeholder="Total dollars sold" readonly>
                                    </td>
                                </tr>
                                <tr>
                                    <td>2</td>
                                    <td>$12.75</td>
                                    <td>
                                            <input class="item-qty" type="text" id="result-qty-item-two" name="result-qty-item-two" placeholder="Number quantity Sold" readonly>
                                    </td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-dollars-item-two" name="result-dollars-item-two" placeholder="Total dollars sold" readonly>
                                    </td>
                                </tr>
                                <tr>
                                    <td>3</td>
                                    <td>$9.95</td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-qty-item-three" name="result-qty-item-three" placeholder="Number quantity Sold" readonly>
                                    </td>
                                    <td>
                                      <input class="item-qty" type="text" id="result-dollars-item-three" name="result-dollars-item-three" placeholder="Total dollars sold" readonly>
                                    </td>
                                </tr>
                                <tr>
                                    <td>4</td>
                                    <td>$35.89</td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-qty-item-four" name="result-qty-item-four" placeholder="Number quantity Sold" readonly>
                                    </td>
                                    <td>
                                        <input class="item-qty" type="text" id="result-dollars-item-four" name="result-dollars-item-four" placeholder="Total dollars sold" readonly>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Total Amount Sold</td>
                                    <td></td>
                                    <td></td>
                                    <td>
                                        <input class="item-qty" type="text" id="total-dollars-sold" name="total-dollars-sold" placeholder="Total dollars sold" readonly>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Total Weekly Earnings</td>
                                    <td></td>
                                    <td></td>
                                    <td>
                                        <input class="item-qty" type="text" id="total-dollars-earn" name="total-dollars-earn" placeholder="Total dollars earn" readonly>
                                    </td>
                                </tr>
                            </table>
                        </form>
                    </div>
                    <br>
                    <a class="back-homework2" href="hw3.html">BACK HOMEWORK 3</a>
                </main>
            </div>
        </div>
    </body>
</html>
