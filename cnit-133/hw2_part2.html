<!DOCTYPE html>
<html lang="en">
    <head>
        <title>JavaScript - Homework 2 Part 2</title>
        <meta charset="utf-8">
        <meta name="description" content="Calculate the sum, average, and product of three integers">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script>
            function sum(num1, num2, num3) {
                return num1 + num2 + num3;
            }

            function average(num1, num2, num3) {
                return sum(num1, num2, num3) / 3;
            }

            function product(num1, num2, num3) {
                return num1 * num2 * num3;
            }

            function calculate() {
                var num1 = parseInt(document.forms['my-form'].elements['first-number'].value);
                var num2 = parseInt(document.forms['my-form'].elements['second-number'].value);
                var num3 = parseInt(document.forms['my-form'].elements['third-number'].value);
                
                if (!isNaN(num1) && !isNaN(num2) && !isNaN(num3)) {
                   var s = sum(num1, num2, num3);
                   var a = average(num1, num2, num3);
                   var p = product(num1, num2, num3);
                   var min = Math.min(num1, num2, num3);
                   var max = Math.max(num1, num2, num3);
                   document.forms["my-form"].elements["result"].value = "Sum: " + s + "\nProduct: " + p + 
                                                                        "\nAverage: " + a + "\nMin: " + min +
                                                                        "\nMax: " + max;
                }else {
                    document.forms["my-form"].elements["result"].value = "Please enter valid numbers.";
                }
            }

            function clear_form() {
               document.getElementById("my-form").reset();
            }
        </script>
    </head>
    <body>
        <a href="hw2.html">< Homework 2 </a>
        <br>
        <br>

        <form name="my-form" id="my-form">
            <label for="first-number">First Number </label>
            <input type="text" id="first-number" name="first-number" required><br>
            <label for="second-number">Second Number </label>
            <input type="text" id="second-number" name="second-number" required><br>
            <label for="third-number">Third Number </label>
            <input type="text" id="third-number" name="third-number" required><br>
            <textarea rows="4" cols="40" name="result"></textarea>
            <input type="button" onclick="calculate()" id="sumbit" value="SUBMIT">
            <input type="button" onclick="clear_form()" id="clear" value="CLEAR">
        </form>
    </body>
</html>
