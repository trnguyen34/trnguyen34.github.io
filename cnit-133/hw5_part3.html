<!DOCTYPE html>
<html lang="en">
    <head>
        <title>States 2019 Census</title>
        <meta charset="utf-8">
        <meta name="description" content="Data bout serveral of US states from the july 2019 census.">
        <script src="js/hw5.js"></script>
    </head>
    <body>
        <div class="content">
            <div class="box-content">
                <main>
                    <div class="heading">
                        <h1>US States Census Data</h1>
                    </div>
                    <form id="state-form" name="state-form">
                        <label for="state">Enter a state: </label><br>
                        <input type="text" id="state" name="state" placeholder="Full Name or Abbreviation">
                        <input type="button" id="state-button" value="submit" onClick="getStateResult();">
                        <input type="reset" id="clear-button" value="clear">
                        <br>
                        <br>
                        <label for="result">State Data Result:</label><br>
                        <textarea readonly class="result-box" id="result" name="result" placeholder="State Result"></textarea><br>
                    </form>
                    <a class="back-homework2" href="hw5.html">BACK HOMEWORK 5</a>
                </main>
            </div>
        </div>
    </body>
