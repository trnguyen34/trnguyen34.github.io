<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Survey</title>
        <meta charset="utf-8">
        <meta name="description" content="A user survey">
        <link rel="stylesheet" href="styles/hw5_part1.css">
        <script src="js/hw5.js"></script>
    </head>
    <body>
        <div class="content">
            <div class="box-content">
                <main>
                    <div class="heading">
                        <h1>Survey</h1>
                    </div>
                    <form class="survey-form" name="survey" id="survey-form">
                        <div id="user-name">
                            <label for="fullname">Full Name:</label><br>
                            <input class="input-box" type="text" id="fullname" name="fullname" placeholder="Enter Name">
                        </div>
                        <br>
                        <div id="radio-button">
                            <label>Select your group age:</label><br>
                            <input type="radio" id="age1" name="age" value="Less than 21">
                            <label for="age1">Less than 21</label><br>
                            <input type="radio" id="age2" name="age" value="Between 21 and 50">
                            <label for="age2">Between 21 and 50</label><br>
                            <input type="radio" id="age3" name="age" value="Older than 50">
                            <label for="age3">Older than 50</label><br>
                        </div>
                        <br>
                        <div id="check-box">
                            <label>Select least one browser you've used:</label><br>
                            <input type="checkbox" id="browser1" name="browsers" value="Firefox">
                            <label for="browser1">Firefox</label>
                            <input type="checkbox" id="browser2" name="browsers" value="Edge">
                            <label for="browser2">Edge</label>
                            <input type="checkbox" id="browser3" name="browsers" value="Chrome">
                            <label for="browser3">Chrome</label>
                            <input type="checkbox" id="browser4" name="browsers" value="Safari">
                            <label for="browser4">Safari</label>
                        </div>
                        <br>
                        <div>
                            <label for="movie-types">Select which type of movie you prefer:</label><br>
                            <select id="movie-types" required>
                                <option value="None" selected disabled hidden> -- select an option -- </option>
                                <option label="Action" value="Action" name="movie">Action</option>
                                <option label="Comedy" value="Comedy" name="movie">Comedy</option>
                                <option label="Drama" value="Drama" name="movie">Drama</option>
                                <option label="Documentary" value="Documentary" name="movie">Documentary</option>
                                <option labe="Science Fiction" value="Science Fiction" name="movie">Science Fiction</option>
                            </select>
                        </div>
                        <br>
                        <div>
                            <textarea readonly class="result-box" id="result" name="result" placeholder=Result></textarea><br>
                        </div>
                            <input class="back-homework2" type="button" onclick="run()" value="SUBMIT">
                            <input class="back-homework2" type="reset" id="clear-button" value="CLEAR">
                    </form>
                    <a class="back-homework2" href="hw5.html">BACK HOMEWORK 5</a>
                </main>
            </div>
        </div>
    </body>
</html>
