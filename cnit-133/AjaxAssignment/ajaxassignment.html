<!DOCTYPE html>
<html lang="en">
    <head>
        <title>AJAX Application</title>
        <meta charset="utf-8">
        <meta name="description" content="AJAX Application">
        <style>
            table,th,td {
            border : 1px solid black;
            border-collapse: collapse;
            }

            th,td {
            padding: 5px;
            }
        </style>
    </head>
    <body>
        <div class="heading">
            <h1>Homework 8 - AJAX Application</h1>
        </div>
        <button type="button" onclick="loadDoc()">Get CD collection</button>
        <br><br>
        <table id="demo"></table>

        <script>
            function loadDoc() {
                const xhttp = new XMLHttpRequest();
                xhttp.onload = function() {
                    myFunction(this);
                }

                xhttp.open("GET", "cd_catalog.xml");
                xhttp.send();
            }

            function myFunction(xml) {
                const xmlDoc = xml.responseXML;
                const x = xmlDoc.getElementsByTagName("CD");
                let table="<tr><th>Artist</th><th>Title</th></tr>";
                for (let i = 0; i <x.length; i++) { 
                    table += "<tr><td>" +
                    x[i].getElementsByTagName("ARTIST")[0].childNodes[0].nodeValue +
                    "</td><td>" +
                    x[i].getElementsByTagName("TITLE")[0].childNodes[0].nodeValue +
                    "</td></tr>";
                }
                
                document.getElementById("demo").innerHTML = table;
            }
        </script>
        <div>
            <h2>Explanation of AJAX</h2>  
        </div>
        <div>
            <h2>REST API</h2>
        </div>
        <a class="back-homework2" href="../hw1.html">Main Page</a>
    </body>
</html>
