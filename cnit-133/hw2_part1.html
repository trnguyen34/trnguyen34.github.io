<!DOCTYPE html>
<html lang="en">
    <head>
        <title>JavaScript - Homework 2 Part 1</title>
        <meta charset="utf-8">
        <meta name="description" content="Using document.write method to write text">
        <style>
            .main-content {
                display: flex;
                justify-content: center;
            }

            .main-content section {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .xy {
                font-family: "Times New Roman", Times, serif;
                color: rgb(226, 7, 7);
                font-size: 16px;
            }
            .number12 {
                color: rgb(51, 102, 255);
                font-family: arial, helvetica, sans-serif;
                font-size: 16px;
                font-weight: 700;
            }
            .number89 {
                color: rgb(0, 128, 0);
                font-family: Impact;
                font-style: italic;
                font-size: 16px;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <a href="hw2.html">< Homework 2 </a>
        <main class="main-content">
            <section>
                <p>
                    <script>
                        document.write("<span class='xy'><strong>xy</strong></span> ");
                        document.write("<span class='number12'>12</span> ");
                        document.write("<span class='number89'>89</span>");
                    </script>
                </p>
            </section>
        </main>
    </body>
</html>
